<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MD PAY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f5f7fb;color:#111;}

.app{max-width:420px;margin:auto;background:#f5f7fb;height:100vh;overflow:auto;padding-bottom:80px}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-weight:600;
}

/* BALANCE */
.balance{
  margin:12px;
  padding:20px;
  border-radius:18px;
  background:linear-gradient(135deg,#16a34a,#4ade80);
  color:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* ACTIONS */
.actions{
  display:flex;
  justify-content:space-around;
  margin:15px 0;
}

.actions div{
  text-align:center;
}

.actions span{
  display:block;
  background:white;
  padding:12px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* BANNER */
.banner{
  margin:12px;
  padding:14px;
  border-radius:14px;
  background:linear-gradient(90deg,#facc15,#fb923c);
  font-weight:600;
}

/* CARD */
.card{
  background:white;
  margin:12px;
  padding:16px;
  border-radius:14px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

/* MARKET */
.market{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BUTTON */
.btn{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:#16a34a;
  color:white;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:420px;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  border-top:1px solid #ddd;
}

.nav div{
  text-align:center;
  font-size:12px;
}

.active{color:#16a34a}
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <span>MD PAY</span>
  <span>🔔</span>
</div>

<!-- BALANCE -->
<div class="balance">
  <p>Total Balance</p>
  <h2>₹12,540</h2>
  <p>Bonus ₹540</p>
</div>

<!-- ACTIONS -->
<div class="actions">
  <div><span>💰</span>Deposit</div>
  <div><span>📤</span>Withdraw</div>
  <div><span>🎁</span>Rewards</div>
  <div><span>👥</span>Team</div>
</div>

<!-- BANNER -->
<div class="banner">
  🔥 Bank 10% | UPI 7% Bonus
</div>

<!-- MARKET -->
<div class="card market">
  <div>
    <strong>₹1000</strong>
    <p>+₹100</p>
  </div>
  <button class="btn">Buy</button>
</div>

<div class="card market">
  <div>
    <strong>₹5000</strong>
    <p>+₹500</p>
  </div>
  <button class="btn">Buy</button>
</div>

<!-- HISTORY -->
<div class="card">
  <p>₹1000 - Success</p>
  <p>₹500 - Pending</p>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <div class="active">Home</div>
  <div>Market</div>
  <div>Rewards</div>
  <div>Team</div>
  <div>Profile</div>
</div>

</body>
  </html>
