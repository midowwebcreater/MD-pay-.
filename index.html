<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>MD PAY</title>

<style>
body{background:#0B0F19;color:#fff;font-family:Arial}
.card{background:#111827;padding:15px;margin:10px;border-radius:10px}
button{background:#22c55e;padding:10px;border:none;color:#fff}
input{width:100%;padding:10px;margin:5px 0}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="card">
    <h2>Login</h2>
    <input id="email">
    <input id="pass" type="password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="card">
    Balance ₹<span id="bal">0</span>
  </div>

  <div class="card">
    <input id="amt" placeholder="Amount">
    <button onclick="buy()">Buy</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  onSnapshot,
  addDoc,
  collection,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBFsnhl9kutSteTqVQO6wg8-tXpYBd6ldA",
  authDomain: "mdpay-e9abc.firebaseapp.com",
  projectId: "mdpay-e9abc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SIGNUP
window.signup = async ()=>{
  const email = email.value;
  const pass = pass.value;

  const res = await createUserWithEmailAndPassword(auth,email,pass);

  await setDoc(doc(db,"users",res.user.uid),{
    balance:0,
    role:"user"
  });

  alert("Signup done");
};

// LOGIN
window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,pass.value);
};

// AUTH STATE
onAuthStateChanged(auth,(user)=>{
  if(user){
    auth.style.display="none";
    app.style.display="block";

    // realtime balance
    onSnapshot(doc(db,"users",user.uid),(snap)=>{
      bal.innerText = snap.data().balance;
    });
  }
});

// BUY
window.buy = async ()=>{
  const amt = Number(amt.value);

  await addDoc(collection(db,"deposits"),{
    userId:auth.currentUser.uid,
    amount:amt,
    status:"pending"
  });

  alert("Deposit request sent");
};

</script>

</body>
</html>
