<!DOCTYPE html>
<html>
<body style="background:#0B0F19;color:#fff">

<h2>Admin</h2>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBFsnhl9kutSteTqVQO6wg8-tXpYBd6ldA",
  projectId:"mdpay-e9abc"
});

const db = getFirestore(app);

// LOAD
onSnapshot(collection(db,"deposits"),snap=>{
  let html="";
  snap.forEach(d=>{
    let x=d.data();

    if(x.status==="pending"){
      html+=`
      <div>
        ₹${x.amount}
        <button onclick="approve('${d.id}','${x.userId}',${x.amount})">
        Approve</button>
      </div>`;
    }
  });

  list.innerHTML=html;
});

// APPROVE
window.approve = async (id,uid,amt)=>{

  const userRef = doc(db,"users",uid);
  const snap = await getDoc(userRef);

  await updateDoc(userRef,{
    balance: snap.data().balance + amt
  });

  await updateDoc(doc(db,"deposits",id),{
    status:"approved"
  });

};

</script>

</body>
</html>
