<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MD PAY – Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:#0B0F19;color:#e5e7eb}
.container{max-width:420px;margin:auto;padding-bottom:80px}

/* HEADER */
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px;font-weight:600
}

/* CARDS */
.card{
  background:#111827;border-radius:14px;padding:14px;margin:10px 12px;
  box-shadow:0 6px 20px rgba(0,0,0,.35)
}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px}
.stat{background:#111827;border-radius:14px;padding:14px}

/* BADGE */
.badge{padding:4px 8px;border-radius:8px;font-size:12px}
.pending{background:#f59e0b;color:#000}
.approved{background:#16a34a}
.rejected{background:#dc2626}

/* ROW */
.row{display:flex;justify-content:space-between;align-items:center;margin:10px 0}

/* BUTTON */
.btn{
  padding:8px 10px;border:none;border-radius:10px;margin-left:6px;cursor:pointer
}
.green{background:#16a34a;color:#fff}
.red{background:#dc2626;color:#fff}
.gray{background:#374151;color:#fff}

/* INPUT */
input{
  width:100%;padding:10px;margin:8px 0;border-radius:10px;border:none;
  background:#020617;color:#fff
}

/* TABLE LIST */
.item{border-bottom:1px solid #1f2937;padding:10px 0}
.small{font-size:12px;color:#9ca3af}

/* TABS */
.tabs{display:flex;gap:8px;padding:0 12px;margin-top:6px}
.tab{flex:1;text-align:center;padding:10px;border-radius:10px;background:#111827;cursor:pointer}
.tab.active{background:#16a34a}

/* HIDDEN */
.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <span>MD PAY – Admin</span>
  <span>⚙️</span>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <div class="small">Total Balance</div>
    <div id="totalBal">₹0</div>
  </div>
  <div class="stat">
    <div class="small">Pending Orders</div>
    <div id="pendingCount">0</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('orders')">Orders</div>
  <div class="tab" onclick="showTab('withdraw')">Withdraw</div>
  <div class="tab" onclick="showTab('users')">Users</div>
  <div class="tab" onclick="showTab('logs')">Logs</div>
</div>

<!-- ORDERS -->
<div id="ordersTab" class="card">
  <h3>Pending Orders</h3>
  <div id="ordersList"></div>
</div>

<!-- WITHDRAW -->
<div id="withdrawTab" class="card hidden">
  <h3>Withdraw Requests</h3>
  <div id="withdrawList"></div>
</div>

<!-- USERS -->
<div id="usersTab" class="card hidden">
  <h3>User Control</h3>

  <input id="userName" placeholder="Username (e.g. user1)">
  <input id="amount" placeholder="Amount">

  <button class="btn green" onclick="addToUser()">Add Balance</button>
  <button class="btn red" onclick="deductFromUser()">Deduct Balance</button>

  <div id="userInfo" class="small" style="margin-top:10px"></div>
</div>

<!-- LOGS -->
<div id="logsTab" class="card hidden">
  <h3>Activity Logs</h3>
  <div id="logsList"></div>
</div>

</div>

<script>

// 🔐 DEMO AUTH CHECK (optional)
let users = JSON.parse(localStorage.getItem("users")) || {
  user1:{pass:"1234",balance:500,role:"user"},
  admin1:{pass:"admin123",balance:0,role:"admin"}
};

// optional guard
let currentUser = localStorage.getItem("currentUser");
if(currentUser && users[currentUser] && users[currentUser].role!=="admin"){
  alert("Access denied");
  location.href="index.html";
}

// 📦 DEMO ADMIN DATA
let adminData = JSON.parse(localStorage.getItem("adminData")) || {
  orders:[
    {id:1,user:"user1",amount:1000,status:"pending"},
    {id:2,user:"user1",amount:5000,status:"pending"}
  ],
  withdraw:[
    {id:1,user:"user1",amount:300,status:"pending"}
  ],
  logs:[]
};

// 🔄 SAVE
function save(){
  localStorage.setItem("adminData",JSON.stringify(adminData));
  localStorage.setItem("users",JSON.stringify(users));
  render();
}

// 📊 RENDER
function render(){

  // stats
  let totalBal = 0;
  Object.values(users).forEach(u=> totalBal += u.balance || 0);
  document.getElementById("totalBal").innerText = "₹"+totalBal;

  document.getElementById("pendingCount").innerText =
    adminData.orders.filter(o=>o.status==="pending").length;

  // orders
  let ohtml="";
  adminData.orders.forEach(o=>{
    ohtml += `
    <div class="item">
      <div class="row">
        <div>
          ₹${o.amount} • ${o.user}<br>
          <span class="badge ${o.status}">${o.status}</span>
        </div>
        <div>
          <button class="btn green" onclick="approveOrder(${o.id})">✓</button>
          <button class="btn red" onclick="rejectOrder(${o.id})">✕</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("ordersList").innerHTML = ohtml || "<p>No orders</p>";

  // withdraw
  let whtml="";
  adminData.withdraw.forEach(w=>{
    whtml += `
    <div class="item">
      <div class="row">
        <div>
          ₹${w.amount} • ${w.user}<br>
          <span class="badge ${w.status}">${w.status}</span>
        </div>
        <div>
          <button class="btn green" onclick="approveWithdraw(${w.id})">✓</button>
          <button class="btn red" onclick="rejectWithdraw(${w.id})">✕</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("withdrawList").innerHTML = whtml || "<p>No requests</p>";

  // logs
  let lhtml="";
  adminData.logs.forEach(l=> lhtml += `<div class="small">${l}</div>`);
  document.getElementById("logsList").innerHTML = lhtml || "<p>No logs</p>";
}

// ✅ APPROVE ORDER
function approveOrder(id){
  let o = adminData.orders.find(x=>x.id===id);
  if(!o) return;

  users[o.user].balance += o.amount;

  o.status="approved";
  adminData.logs.unshift(`Order approved ₹${o.amount} for ${o.user}`);

  save();
}

// ❌ REJECT ORDER
function rejectOrder(id){
  adminData.orders = adminData.orders.filter(x=>x.id!==id);
  adminData.logs.unshift("Order rejected");
  save();
}

// 💸 APPROVE WITHDRAW
function approveWithdraw(id){
  let w = adminData.withdraw.find(x=>x.id===id);
  if(!w) return;

  if(users[w.user].balance < w.amount){
    alert("Insufficient balance");
    return;
  }

  users[w.user].balance -= w.amount;

  w.status="approved";
  adminData.logs.unshift(`Withdraw approved ₹${w.amount}`);

  save();
}

// ❌ REJECT WITHDRAW
function rejectWithdraw(id){
  adminData.withdraw = adminData.withdraw.filter(x=>x.id!==id);
  adminData.logs.unshift("Withdraw rejected");
  save();
}

// 👤 USER CONTROL
function addToUser(){
  let u = userName.value;
  let amt = Number(amount.value);

  if(!users[u]){ alert("User not found"); return; }

  users[u].balance += amt;
  adminData.logs.unshift(`Manual +₹${amt} to ${u}`);

  save();
}

function deductFromUser(){
  let u = userName.value;
  let amt = Number(amount.value);

  if(!users[u]){ alert("User not found"); return; }

  users[u].balance -= amt;
  adminData.logs.unshift(`Manual -₹${amt} from ${u}`);

  save();
}

// 🔀 TABS
function showTab(tab){
  document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"));
  document.getElementById(tab+"Tab").classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
}

// INIT
render();

</script>

</body>
</html>
